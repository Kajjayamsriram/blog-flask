{% extends "base.html" %}

{% block title %}Create Post - Modern Blog{% endblock %}

{% block content %}
<div class="create-post-container">
    <div class="create-post-header">
        <h1>Create New Post</h1>
        <p>Share your story with the world</p>
    </div>
    
    <form method="POST" action="{{ url_for('create_post') }}" class="create-post-form">
        <div class="form-group">
            <label for="title">Post Title *</label>
            <input type="text" id="title" name="title" required placeholder="Enter an amazing title...">
        </div>
        
        <div class="form-group">
            <label for="author">Author Name *</label>
            <input type="text" id="author" name="author" required placeholder="Your name">
        </div>
        
        <div class="form-group">
            <label for="content">Post Content *</label>
            <textarea id="content" name="content" rows="10" required placeholder="Write your story here..."></textarea>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="submit-btn">📤 Publish Post</button>
            <a href="/" class="cancel-btn">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
